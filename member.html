<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সদস্যবৃন্দ - আত্মশুদ্ধি</title>
<link rel="icon" href="favicon.png" sizes="180x180">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0fdf4;
    --card-bg: rgba(255,255,255,0.85);
    --accent: #10b981;
    --accent-dark: #059669;
    --text: #1e293b;
    --text-light: #64748b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Noto Sans Bengali', sans-serif;
    background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #ecfdf5 100%);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 700px;
    width: 100%;
    padding: 4px 6px;
    border-radius: 16px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .nav-links { display: flex; flex-wrap: wrap; gap: 2px; }
  .nav-links a {
    color: var(--text-light);
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.25s ease;
  }
  .nav-links a:hover { background: rgba(16,185,129,0.1); color: var(--accent-dark); }
  .nav-links a.active { background: rgba(16,185,129,0.15); color: var(--accent-dark); font-weight: 600; }
  .nav-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    padding: 10px 14px;
    border-radius: 10px;
    color: var(--text);
  }
  .nav-toggle:hover { background: rgba(0,0,0,0.05); }

  @media (max-width: 640px) {
    .nav-toggle { display: block; }
    .nav-links { display: none; flex-direction: column; width: 100%; padding: 4px 0 8px; }
    .nav-links.show { display: flex; }
    .navbar { flex-wrap: wrap; }
    .site-subtitle { font-size: 1.1rem; }
  }

  .page-title {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    margin: 28px 0 8px;
    text-align: center;
  }

  .site-subtitle {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text-light);
    margin: 28px 0 4px;
    text-align: center;
  }

  .member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    max-width: 700px;
    width: 100%;
    margin: 16px 0 32px;
  }

  .member-card {
    background: var(--card-bg);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 16px;
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    font-family: inherit;
  }
  .member-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(16,185,129,0.15);
    border-color: var(--accent);
    background: white;
  }
  .member-card .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #3b82f6);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 700;
    margin: 0 auto 10px;
  }

  /* Login Modal */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .modal-content {
    background: white;
    padding: 32px 28px 28px;
    border-radius: 20px;
    width: 340px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.15);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-content h2 { margin: 0 0 20px; color: var(--text); font-size: 1.3rem; font-weight: 700; }
  .modal-content input {
    width: 100%; padding: 12px 14px; margin: 8px 0;
    border: 1px solid #e2e8f0; border-radius: 12px;
    font-size: 0.95rem; font-family: inherit; outline: none;
    box-sizing: border-box; transition: border 0.2s;
  }
  .modal-content input:focus { border-color: var(--accent); }
  .modal-content button {
    width: 100%; padding: 12px; margin-top: 12px;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white; font-size: 1rem; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all 0.25s ease;
  }
  .modal-content button:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(16,185,129,0.3); }
  .close { float: right; cursor: pointer; color: #94a3b8; font-size: 1.4rem; transition: color 0.2s; }
  .close:hover { color: #ef4444; }
  #loginMsg { color: #ef4444; font-size: 0.85rem; margin-top: 12px; }
</style>
</head>
<body>
<p class="site-subtitle" style="text-align:center;font-size:1.4rem;font-weight:700;color:var(--text-light);margin:16px 16px 0;"></p>

<nav class="navbar">
  <button class="nav-toggle" onclick="toggleMenu()">☰</button>
  <div class="nav-links" id="menu">
    <a href="index.html">হোম</a>
    <a href="member.html" class="active">সদস্যবৃন্দ</a>
      <a href="memory.html">আমাদের স্মৃতি</a>
      <a href="kalam.html">মাইজভাণ্ডারী কালাম</a>
      <a href="about.html">আত্মশুদ্ধি সম্পর্কে</a>
  </div>
</nav>

<h2 class="page-title">সদস্যবৃন্দ</h2>

<div class="member-grid" id="memberGrid"></div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeLogin()">&times;</span>
    <h2>সদস্য লগইন</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="memberLogin()">Login</button>
    <p id="loginMsg"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC63JYlboedK6hE_u4ubAT0Nm2PIo-ygQk",
  authDomain: "atmoshuddi.firebaseapp.com",
  projectId: "atmoshuddi",
  storageBucket: "atmoshuddi.firebasestorage.app",
  messagingSenderId: "540869594984",
  appId: "1:540869594984:web:667a69b95b6edd983ed0dd",
  measurementId: "G-X9HQ1DN4P7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const members = [
  {name:"Nahidul Islam Shahin", email:"nahidul@example.com"},
  {name:"Shohrah Uddin Sowrov", email:"sowrov@example.com"},
  {name:"Zahedul Amin Sohag", email:"sohag@example.com"},
  {name:"Ziabul", email:"ziabul@example.com"},
  {name:"Mojibul Alam", email:"mojibul@example.com"},
  {name:"Jahir Amor", email:"jahir@example.com"},
  {name:"Abu Arif Naim", email:"naim@example.com"},
  {name:"Nahidul Islam Tipu", email:"tipu@example.com"},
  {name:"Mofiz Alam", email:"mofiz@example.com"},
  {name:"Jalal Uddin Rumi", email:"rumi@example.com"},
  {name:"Shaker Alam", email:"shaker@example.com"},
  {name:"Mahbubul Alam", email:"mahbub@example.com"},
  {name:"Nezam Uddin", email:"nezam@example.com"}
];

const grid = document.getElementById("memberGrid");
members.forEach(m => {
  const card = document.createElement("button");
  card.className = "member-card";
  const initial = m.name.charAt(0);
  card.innerHTML = `<div class="avatar">${initial}</div>${m.name}`;
  card.dataset.email = m.email;
  card.dataset.name = m.name;
  card.onclick = () => openLogin(card);
  grid.appendChild(card);
});

let selectedEmail = "";
let selectedName = "";

window.toggleMenu = function () {
  document.getElementById("menu").classList.toggle("show");
}

window.openLogin = function(btn) {
  selectedEmail = btn.dataset.email;
  selectedName = btn.dataset.name;
  document.getElementById("email").value = selectedEmail;
  document.getElementById("loginModal").style.display = "flex";
}

window.closeLogin = function() {
  document.getElementById("loginModal").style.display = "none";
  document.getElementById("loginMsg").textContent = "";
}

window.memberLogin = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("loginMsg");

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const memberDoc = await getDoc(doc(db, "members", cred.user.uid));
    if (memberDoc.exists()) {
      localStorage.setItem("memberName", selectedName);
      if (!memberDoc.data().name) {
        await setDoc(doc(db, "members", cred.user.uid), { name: selectedName }, { merge: true });
      }
      window.location.href = "members/member-dashboard.html";
    } else {
      msg.textContent = "❌ আপনি একজন বৈধ সদস্য নন!";
    }
  } catch (error) {
    msg.textContent = "❌ " + error.message;
  }
}
</script>
<script src="js/common.js"></script>
</body>
</html>
