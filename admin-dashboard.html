let selectedUID = null;
let draggedRow = null;

function makeRowsDraggable() {
  const rows = tableBody.querySelectorAll("tr");
  rows.forEach(row => {
    row.setAttribute("draggable", true);
    row.addEventListener("dragstart", () => { draggedRow = row; row.classList.add("dragging"); });
    row.addEventListener("dragend", () => { draggedRow = null; row.classList.remove("dragging"); });
    row.addEventListener("dragover", (e) => {
      e.preventDefault();
      const bounding = row.getBoundingClientRect();
      if (e.clientY - bounding.top > bounding.height / 2) {
        row.style.borderBottom = "3px solid #3b82f6";
        row.style.borderTop = "";
      } else {
        row.style.borderTop = "3px solid #3b82f6";
        row.style.borderBottom = "";
      }
    });
    row.addEventListener("dragleave", () => { row.style.borderBottom = ""; row.style.borderTop = ""; });
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      row.style.borderBottom = ""; row.style.borderTop = "";
      if (draggedRow !== row) {
        const bounding = row.getBoundingClientRect();
        if (e.clientY - bounding.top > bounding.height / 2) row.after(draggedRow);
        else row.before(draggedRow);
      }
    });
  });
}

let currentContributions = [];

memberSelect.addEventListener("change", async () => {
  tableBody.innerHTML = "";
  selectedUID = memberSelect.value;
  if (!selectedUID) return;

  const memberDoc = doc(db, "members", selectedUID);
  const snap = await getDoc(memberDoc);
  if (!snap.exists()) return;

  currentContributions = (snap.data().contributions || []).map(item => {
    if (!item.id) item.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    return item;
  });
  let total = 0;
  currentContributions.forEach(item => total += item.amount);
  totalAmountCell.textContent = total;

  currentContributions.forEach(item => {
    const tr = document.createElement("tr");
    tr.dataset.id = item.id;
    tr.innerHTML = `<td>${item.month}</td><td>${item.amount}</td><td></td>`;
    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    Object.assign(delBtn.style, { background: "#ef4444", color: "white", border: "none", borderRadius: "8px", cursor: "pointer" });
    delBtn.addEventListener("click", async () => {
      if (confirm("⚠ আপনি কি নিশ্চিত?")) {
        await updateDoc(memberDoc, { contributions: arrayRemove(item) });
        tr.remove();
        totalAmountCell.textContent = parseInt(totalAmountCell.textContent) - item.amount;
      }
    });
    tr.children[2].appendChild(delBtn);
    tableBody.appendChild(tr);
  });
  makeRowsDraggable();
});

document.getElementById("saveBtn").addEventListener("click", async () => {

  const amount = parseInt(document.getElementById("amount").value.trim());
  if (!month || !amount) return alert("⚠ সব ফিল্ড পূরণ করুন!");
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  await updateDoc(doc(db, "members", selectedUID), { contributions: arrayUnion({ id, month, amount }) });
  document.getElementById("month").value = "";
  document.getElementById("amount").value = "";
  memberSelect.dispatchEvent(new Event("change"));
  alert("✅ নতুন ডাটা সেভ হয়েছে!");
});

});

document.getElementById("saveNoticeBtn").addEventListener("click", async () => {

// ---- Kalam CRUD ----
let editingKalamId = null;

async function loadKalamsAdmin() {
  try {
    const snap = await getDocs(query(collection(db, "kalam"), orderBy("number", "asc")));
    const container = document.getElementById("kalamListAdmin");
    container.innerHTML = "";
    snap.forEach(docSnap => {
      const k = docSnap.data();
      const div = document.createElement("div");
      div.className = "kalam-admin-item";
      div.innerHTML = `
        <div class="num">${k.number}</div>
        <div class="info"><h4>${k.title}</h4><p>${k.writer ? k.writer + ' — ' : ''}${(k.content||"").slice(0,80)}</p></div>
        <div class="actions">
          <button class="edit-btn" data-id="${docSnap.id}">Edit</button>
          <button class="del-btn" data-id="${docSnap.id}">Delete</button>
        </div>`;
      div.querySelector(".edit-btn").onclick = () => editKalam(docSnap.id, k);
      div.querySelector(".del-btn").onclick = () => deleteKalam(docSnap.id);
      container.appendChild(div);
    });
    } catch (e) { console.error("Failed to load kalams:", e); }
}

function editKalam(id, k) {
  editingKalamId = id;
  document.getElementById("kalamTitle").value = k.title;
  document.getElementById("kalamWriter").value = k.writer || "";
  document.getElementById("kalamContent").value = k.content;
  document.getElementById("saveKalamBtn").style.display = "none";
  document.getElementById("updateKalamBtn").style.display = "inline-block";
  document.getElementById("cancelKalamBtn").style.display = "inline-block";
}

function cancelEdit() {
  editingKalamId = null;
  document.getElementById("kalamTitle").value = "";
  document.getElementById("kalamWriter").value = "";
  document.getElementById("kalamContent").value = "";
  document.getElementById("saveKalamBtn").style.display = "inline-block";
  document.getElementById("updateKalamBtn").style.display = "none";
  document.getElementById("cancelKalamBtn").style.display = "none";
}

function toBanglaNum(n) {
  return String(n).replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}

function isMonthName(text) {
  const months = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর','jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const lower = text.toLowerCase();
  return months.some(m => lower.includes(m));
}

function getPdfTitle(month) {
  if (isMonthName(month)) {
    return { title: "হযরত আকবর শাহ বাবাজানের ব্যাংক একাউন্টের", subtitle: "মাসিক হাদিয়া (" + month + ")" };
  }
  return { title: month, subtitle: "এর হিসাব" };
}

document.getElementById("generatePdfBtn").addEventListener("click", async () => {
  const month = document.getElementById("pdfMonth").value.trim().replace(/['']/g, "'");
  if (!month) return alert("⚠ মাস লিখুন!");

  const allMembers = Object.entries(memberNicknames);
  const results = [];

  for (const [uid, nickname] of allMembers) {
    const snap = await getDoc(doc(db, "members", uid));
    if (!snap.exists()) continue;
    const contributions = snap.data().contributions || [];
    const match = contributions.find(c => {
      const stored = c.month.trim().replace(/['']/g, "'");
      return stored.includes(month) || month.includes(stored);
    });
    if (match && match.amount > 0) {
      results.push({ nickname, amount: match.amount });
    }
  }

  if (results.length === 0) return alert("⚠ এই মাসে কোনো অবদান পাওয়া যায়নি!");

  const total = results.reduce((sum, r) => sum + r.amount, 0);
  const titleData = getPdfTitle(month);

  document.getElementById("pdfTitle").textContent = titleData.title;
  document.getElementById("pdfSubtitle").textContent = titleData.subtitle;

  const element = document.getElementById("pdfContent");
  const pdfTemplate = document.getElementById("pdfTemplate");
  const bgColor = isMonthName(month) ? "#FFD700" : "#22c55e";
  const txtColor = isMonthName(month) ? "#1e40af" : "#ffffff";

  let listHTML = "";
  results.forEach((r, i) => {
    const num = toBanglaNum(i + 1);
    const amt = toBanglaNum(r.amount);
    listHTML += '<div style="display:flex;align-items:baseline;"><span style="font-weight:700;color:' + txtColor + ';">' + num + '. ' + r.nickname + '</span><span style="flex:1;border-bottom:2px dashed ' + txtColor + ';margin:0 8px;position:relative;top:-4px;"></span><span style="font-weight:600;color:' + txtColor + ';">' + amt + '/-</span></div>';
  });
  document.getElementById("pdfList").innerHTML = listHTML;
  document.getElementById("pdfTotal").innerHTML = "মোট <span style=\"border-bottom:2px dashed " + txtColor + ";display:inline-block;width:60%;margin:0 12px;position:relative;top:-4px;\"></span> " + toBanglaNum(total) + "/-";

  element.style.background = bgColor;
  element.style.color = txtColor;
  document.getElementById("pdfTitle").style.color = "#1e40af";
  document.getElementById("pdfSubtitle").style.color = "#1e40af";
  pdfTemplate.style.left = "0";
  pdfTemplate.style.position = "relative";

  html2canvas(element, { scale: 2, useCORS: true, backgroundColor: bgColor }).then(canvas => {
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = (canvas.height * pdfW) / canvas.width;
    pdf.addImage(imgData, "PNG", 0, 0, pdfW, pdfH);
    pdf.save("hadia_" + month + ".pdf");

    pdfTemplate.style.left = "-9999px";
    pdfTemplate.style.position = "absolute";
    element.style.background = "#FFD700";
    document.getElementById("pdfTitle").style.color = "#ffffff";
    document.getElementById("pdfSubtitle").style.color = "#ffffff";
  }).catch(err => {
    console.error(err);
    pdfTemplate.style.left = "-9999px";
    pdfTemplate.style.position = "absolute";
    alert("❌ PDF তৈরিতে সমস্যা হয়েছে!");
  });
});
