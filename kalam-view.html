<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কালাম - আত্মশুদ্ধি</title>
<link rel="icon" href="favicon.png" sizes="180x180">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0fdf4;
    --card-bg: rgba(255,255,255,0.92);
    --accent: #10b981;
    --accent-dark: #059669;
    --text: #1e293b;
    --text-light: #64748b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Noto Sans Bengali', sans-serif;
    background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #ecfdf5 100%);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 700px;
    width: 100%;
    padding: 4px 6px;
    border-radius: 16px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .nav-links { display: flex; flex-wrap: wrap; gap: 2px; }
  .nav-links a {
    color: var(--text-light);
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.25s ease;
  }
  .nav-links a:hover { background: rgba(16,185,129,0.1); color: var(--accent-dark); }
  .nav-links a.active { background: rgba(16,185,129,0.15); color: var(--accent-dark); font-weight: 600; }
  .nav-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    padding: 10px 14px;
    border-radius: 10px;
    color: var(--text);
  }
  .nav-toggle:hover { background: rgba(0,0,0,0.05); }

  @media (max-width: 640px) {
    .nav-toggle { display: block; }
    .nav-links { display: none; flex-direction: column; width: 100%; padding: 4px 0 8px; }
    .nav-links.show { display: flex; }
    .navbar { flex-wrap: wrap; }
  }

  .card {
    max-width: 700px;
    width: 100%;
    margin-top: 24px;
    padding: 40px 36px;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent-dark);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 20px;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.7; }

  .num-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 3px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .card h2 {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    margin: 0 0 6px;
    line-height: 1.3;
  }

  .writer {
    font-size: 1rem;
    color: var(--accent-dark);
    font-weight: 500;
    margin-bottom: 20px;
  }

  .separator {
    width: 50px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-dark));
    border-radius: 4px;
    margin: 0 0 24px;
  }

  .content {
    font-size: 1.05rem;
    color: var(--text-light);
    line-height: 2.1;
    white-space: pre-wrap;
  }

  #loading {
    text-align: center;
    margin-top: 60px;
    font-size: 1.1rem;
    color: var(--text-light);
  }

  @media (max-width: 640px) {
    .site-subtitle { font-size: 1.1rem; }
    .card { padding: 28px 20px; margin-top: 16px; }
    .card h2 { font-size: 1.5rem; }
    .content { font-size: 0.95rem; }
  }
</style>
</head>
<body>
  <p class="site-subtitle" style="text-align:center;font-size:1.4rem;font-weight:700;color:#64748b;margin:16px 16px 0;"></p>
  <nav class="navbar">
    <button class="nav-toggle" onclick="toggleMenu()">☰</button>
    <div class="nav-links" id="menu">
      <a href="index.html">হোম</a>
      <a href="member.html">সদস্যবৃন্দ</a>
      <a href="memory.html">আমাদের স্মৃতি</a>
      <a href="kalam.html" class="active">মাইজভাণ্ডারী কালাম</a>
      <a href="about.html">আত্মশুদ্ধি সম্পর্কে</a>
    </div>
  </nav>

  <div id="loading">⏳ লোড হচ্ছে...</div>

  <div class="card" id="kalamView" style="display:none">
    <a class="back-link" href="kalam.html">← কালাম তালিকায় ফিরুন</a>
    <div class="num-badge" id="kalamNumber"></div>
    <h2 id="kalamTitle"></h2>
    <div class="writer" id="kalamWriter"></div>
    <div class="separator"></div>
    <div class="content" id="kalamContent"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC63JYlboedK6hE_u4ubAT0Nm2PIo-ygQk",
      authDomain: "atmoshuddi.firebaseapp.com",
      projectId: "atmoshuddi",
      storageBucket: "atmoshuddi.firebasestorage.app",
      messagingSenderId: "540869594984",
      appId: "1:540869594984:web:667a69b95b6edd983ed0dd",
      measurementId: "G-X9HQ1DN4P7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.toggleMenu = function () {
      document.getElementById("menu").classList.toggle("show");
    }

    const params = new URLSearchParams(window.location.search);
    const kalamId = params.get("id");

    if (!kalamId) {
      document.getElementById("loading").textContent = "❌ কোনো কালাম আইডি দেওয়া হয়নি";
    } else {
      (async () => {
        try {
          const snap = await getDoc(doc(db, "kalam", kalamId));
          if (!snap.exists()) {
            document.getElementById("loading").textContent = "❌ কালাম পাওয়া যায়নি";
            return;
          }
          const k = snap.data();
          document.getElementById("loading").style.display = "none";
          document.getElementById("kalamView").style.display = "block";

          document.title = k.title + " - আত্মশুদ্ধি";
          document.getElementById("kalamNumber").textContent = toBanglaNum(k.number);
          document.getElementById("kalamTitle").textContent = k.title;
          document.getElementById("kalamWriter").textContent = k.writer ? "✍️ রচয়িতা: " + k.writer : "";
          document.getElementById("kalamContent").textContent = k.content;
        } catch (e) {
          document.getElementById("loading").textContent = "❌ লোড করতে সমস্যা হয়েছে!";
        }
      })();
    }

    function toBanglaNum(n) {
      return String(n).replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);
    }
  </script>
<script src="js/common.js"></script>
</body>
</html>
